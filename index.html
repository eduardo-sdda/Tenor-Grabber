<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tenor Grabber — Download any Tenor user's GIFs</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  
 

:root {

  --bg: #eaeaea;
  --surface: #ffffff;
  --border: #d8e7f2;
  --accent: #49acfc;
  --accent2: #5c9fd4;
  --text: #111111;
  --muted: #6c7a86;
  --heading-start: #111111;
  --heading-end: #777777;
  --btn-text: #000000;
  --btn-hover: #7dd4fc;
  --error-bg: #fff0f0;
  --success: #2ecc71;
  --error: #e03030;
}


[data-theme="dark"] {

  --bg: #111111;
  --surface: #151a1f;
  --border: #2a323a;

  --accent: #49acfc;
  --accent2: #8db4d3;

  --text: #eaeaea;
  --muted: #9aa7b3;

  --heading-start: #eaeaea;
  --heading-end:   #888888;

  --btn-text:  #000000;
  --btn-hover: #90e0ff;

  --error-bg: #1a0a0a;

  --success: #47ffb4;
  --error: #ff6b6b;
}


  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── background grain ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
    opacity: 0.03;
    pointer-events: none;
    z-index: 0;
  }

  /* ── layout ── */
  .wrap {
    position: relative;
    z-index: 1;
    max-width: 740px;
    margin: 0 auto;
    padding: 0 24px 80px;
  }

  /* ── header ── */
  header {
    padding: 64px 0 48px;
    animation: fadeDown .6s ease both;
  }

  .eyebrow {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: .2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 16px;
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(64px, 12vw, 96px);
    line-height: .95;
    letter-spacing: .01em;
    background: linear-gradient(135deg, var(--heading-start) 40%, var(--heading-end) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 20px;
  }

  h1 span {
    -webkit-text-fill-color: var(--accent);
  }

  .subtitle {
    font-size: 15px;
    color: var(--muted);
    line-height: 1.6;
    max-width: 480px;
  }

  /* ── input card ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px;
    margin-bottom: 24px;
    animation: fadeUp .5s .15s ease both;
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: stretch;
  }

  .input-wrap {
    flex: 1;
    position: relative;
  }

  .at {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    font-family: 'DM Mono', monospace;
    font-size: 16px;
    color: var(--accent);
    pointer-events: none;
    user-select: none;
  }

  input[type="text"] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 14px 14px 32px;
    font-family: 'DM Mono', monospace;
    font-size: 16px;
    color: var(--text);
    outline: none;
    transition: border-color .2s;
  }

  input[type="text"]:focus {
    border-color: var(--accent);
  }

  input[type="text"]::placeholder { color: var(--muted); }

  button.go {
    background: var(--accent);
    color: var(--btn-text);
    border: none;
    border-radius: 8px;
    padding: 14px 28px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: .08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: transform .15s, background .15s;
    white-space: nowrap;
  }

  button.go:hover { background: var(--btn-hover); transform: translateY(-1px); }
  button.go:active { transform: translateY(0); }
  button.go:disabled { opacity: .4; cursor: not-allowed; transform: none; }

  button.stop-btn {
    background: none;
    color: var(--error);
    border: 1px solid var(--error);
    border-radius: 8px;
    padding: 14px 20px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: .08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background .15s, color .15s;
    white-space: nowrap;
  }
  button.stop-btn:hover { background: var(--error); color: #fff; }

  /* ── options row ── */
  .options {
    display: flex;
    gap: 20px;
    margin-top: 16px;
    flex-wrap: wrap;
  }

  label.opt {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
    user-select: none;
  }

  label.opt input[type="checkbox"] {
    accent-color: var(--accent);
    width: 14px;
    height: 14px;
  }

  label.opt:hover { color: var(--text); }

  /* ── status bar ── */
  #status-wrap {
    display: none;
    animation: fadeUp .3s ease both;
  }

  .status-bar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 24px;
    margin-bottom: 12px;
  }

  .status-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }

  .status-label {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .status-count {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--accent);
  }

  .progress-track {
    height: 3px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 99px;
    width: 0%;
    transition: width .3s ease;
  }

  .status-msg {
    margin-top: 10px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ── log ── */
  #log-wrap {
    display: none;
  }

  .log-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }

  .log-title {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: .15em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .log-clear {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    background: none;
    border: none;
    cursor: pointer;
    padding: 0;
  }
  .log-clear:hover { color: var(--text); }

  #log {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    line-height: 1.8;
    height: 180px;
    overflow-y: auto;
    color: var(--muted);
  }

  #log::-webkit-scrollbar { width: 4px; }
  #log::-webkit-scrollbar-track { background: transparent; }
  #log::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .log-ok    { color: var(--success); }
  .log-err   { color: var(--error); }
  .log-info  { color: var(--accent); }
  .log-dim   { color: var(--muted); }

  /* ── done card ── */
  #done-card {
    display: none;
    background: var(--surface);
    border: 1px solid var(--accent);
    border-radius: 12px;
    padding: 28px;
    margin-bottom: 24px;
    animation: fadeUp .4s ease both;
  }

  .done-top {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 8px;
  }

  .done-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    color: var(--accent);
  }

  .done-sub {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
  }

  .done-stats {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 20px;
  }

  .done-stats strong { color: var(--text); }

  button.dl-btn {
    background: var(--accent);
    color: var(--btn-text);
    border: none;
    border-radius: 8px;
    padding: 14px 32px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: .08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: transform .15s, background .15s;
  }

  button.dl-btn:hover { background: var(--btn-hover); transform: translateY(-1px); }
  button.dl-btn:active { transform: translateY(0); }

  button.again-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 8px;
    padding: 14px 24px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: .08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: border-color .2s, color .2s;
    margin-left: 10px;
  }
  button.again-btn:hover { border-color: var(--text); color: var(--text); }

  /* ── error ── */
  #error-card {
    display: none;
    background: var(--error-bg);
    border: 1px solid var(--error);
    border-radius: 12px;
    padding: 20px 24px;
    margin-bottom: 24px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--error);
    animation: fadeUp .3s ease both;
  }

  /* ── footer ── */
  footer {
    margin-top: 64px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
  }

  footer a { color: var(--muted); text-decoration: none; }
  footer a:hover { color: var(--text); }

  /* ── animations ── */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── spinner on button ── */
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
  .spinner {
    display: inline-block;
    width: 12px; height: 12px;
    border: 2px solid color-mix(in srgb, var(--btn-text) 25%, transparent);
    border-top-color: var(--btn-text);
    border-radius: 50%;
    animation: spin .6s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }

  @media (max-width: 480px) {
    .input-row { flex-direction: column; }
    button.go { width: 100%; }
  }

#theme-toggle{
  position: fixed;
  top: 18px;
  right: 18px;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 8px;
  padding: 8px 10px;
  cursor: pointer;
  font-size: 14px;
  z-index: 999;
}

#theme-toggle:hover{
  border-color: var(--accent);
}

</style>
</head>
<body>
<button id="theme-toggle">🌙</button>
<div class="wrap">

  <header>
    <h1>TENOR<br><span>GRABBER</span></h1>
    <p class="subtitle">Download every GIF uploaded by any Tenor user, packed into a ZIP.<br>No account needed. No server. Runs entirely in your browser.</p>
  </header>

  <!-- Input -->
  <div class="card">
    <div class="input-row">
      <div class="input-wrap">
        <span class="at">@</span>
        <input type="text" id="username" placeholder="username" autocomplete="off" autocorrect="off" spellcheck="false">
      </div>
      <button class="go" id="go-btn" onclick="start()">GRAB</button>
      <button class="stop-btn" id="stop-btn" onclick="abort()" style="display:none">STOP</button>
    </div>
    <div class="options">
      <label class="opt">
        <input type="checkbox" id="opt-best" checked>
        Best quality GIF
      </label>
      <label class="opt">
        <input type="checkbox" id="opt-include-title" checked>
        Include title in filename
      </label>
    </div>
  </div>

  <!-- Status -->
  <div id="status-wrap">
    <div class="status-bar">
      <div class="status-top">
        <span class="status-label" id="phase-label">Fetching list...</span>
        <span class="status-count" id="count-label">0 / 0</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
      <div class="status-msg" id="status-msg">Starting...</div>
    </div>

    <div id="log-wrap">
      <div class="log-header">
        <span class="log-title">// activity log</span>
        <button class="log-clear" onclick="clearLog()">clear</button>
      </div>
      <div id="log"></div>
    </div>
  </div>

  <!-- Done -->
  <div id="done-card">
    <div class="done-top">
      <span class="done-label">DONE.</span>
      <span class="done-check">✅</span>
      <span class="done-sub" id="done-sub"></span>
    </div>
    <div class="done-stats" id="done-stats"></div>
    <button class="dl-btn" id="dl-btn"><svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:7px;margin-bottom:1px"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>DOWNLOAD ZIP</button>
    <button class="again-btn" onclick="reset()">GRAB ANOTHER</button>
  </div>

  <!-- Error -->
  <div id="error-card" id="error-card"></div>

  <footer>
    <span>tenor grabber — runs 100% in your browser</span>
  </footer>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
// ── Config ────────────────────────────────────────────────────────────────────
const API_KEY    = "AIzaSyC-P6_qz3FzCoXGLk6tgitZo4jEJ5mLzD8";
const CLIENT_KEY = "tenor_web";
const API_BASE   = "https://tenor.googleapis.com/v2";
const LIMIT      = 50;

// ── State ─────────────────────────────────────────────────────────────────────
let zipData = null;
let aborted = false;

// ── UI helpers ────────────────────────────────────────────────────────────────
const $  = id => document.getElementById(id);
const log = (msg, cls = "log-dim") => {
  const el = $("log");
  const line = document.createElement("div");
  line.className = cls;
  line.textContent = msg;
  el.appendChild(line);
  el.scrollTop = el.scrollHeight;
};

const setPhase   = t  => $("phase-label").textContent = t;
const setCount   = (n, t) => $("count-label").textContent = t ? `${n} / ${t}` : `${n}`;
const setMsg     = t  => $("status-msg").textContent = t;
const setProgress = pct => $("progress-fill").style.width = pct + "%";

function showStatus() {
  $("status-wrap").style.display = "block";
  $("log-wrap").style.display    = "block";
}
function showDone(username, ok, total, zipBlob) {
  $("done-card").style.display = "block";
  $("done-sub").textContent    = `@${username}`;
  $("done-stats").innerHTML    =
    `<strong>${ok}</strong> GIFs downloaded &nbsp;·&nbsp; ` +
    `<strong>${(zipBlob.size / 1024 / 1024).toFixed(1)} MB</strong> total`;
  $("dl-btn").onclick = () => triggerDownload(zipBlob, `${username}_tenor_gifs.zip`);
  // restore the grab button
  $("go-btn").disabled  = false;
  $("go-btn").innerHTML = "GRAB";
  $("username").disabled = false;
  $("stop-btn").style.display = "none";
}
function showError(msg) {
  const el = $("error-card");
  el.textContent = "⚠ " + msg;
  el.style.display = "block";
}
function clearLog() { $("log").innerHTML = ""; }

function triggerDownload(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a   = document.createElement("a");
  a.href = url; a.download = filename; a.click();
  setTimeout(() => URL.revokeObjectURL(url), 5000);
}

function abort() {
  aborted = true;
  log("⏹ stopped by user", "log-err");
  reset();
}

function reset() {
  $("status-wrap").style.display = "none";
  $("done-card").style.display   = "none";
  $("error-card").style.display  = "none";
  $("log").innerHTML = "";
  setProgress(0);
  $("go-btn").disabled   = false;
  $("go-btn").innerHTML  = "GRAB";
  $("username").disabled = false;
  $("stop-btn").style.display = "none";
  zipData = null;
  // NOTE: aborted is intentionally NOT reset here.
  // It stays true until a new start() begins, so any still-running
  // async loop from a stopped session stays dead.
}

// ── API ───────────────────────────────────────────────────────────────────────
async function fetchAllGifs(username) {
  const records = [];
  let pos = null;

  while (true) {
    const params = new URLSearchParams({
      key:          API_KEY,
      client_key:   CLIENT_KEY,
      q:            `@${username}`,
      limit:        LIMIT,
      media_filter: "gif,mediumgif,tinygif",
    });
    if (pos) params.set("pos", pos);

    const r    = await fetch(`${API_BASE}/search?${params}`);
    const data = await r.json();
    const batch = data.results || [];

    if (!batch.length) break;
    records.push(...batch);

    setCount(records.length);
    setMsg(`Found ${records.length} GIFs so far...`);
    log(`page fetched — ${records.length} total`, "log-info");

    const next = data.next || "";
    if (!next || next === pos) break;
    pos = next;

    if (aborted) break;
    await sleep(200);
  }
  return records;
}

function getGifUrl(record, bestQuality) {
  const fmt = record.media_formats || {};
  const order = bestQuality
    ? ["gif", "mediumgif", "tinygif"]
    : ["tinygif", "mediumgif", "gif"];
  for (const k of order) {
    if (fmt[k]?.url) return fmt[k].url;
  }
  return null;
}

function safeFilename(text, max = 60) {
  return text.replace(/[<>:"/\\|?*\n\r\t]/g, "").trim().replace(/\s+/g, "_").slice(0, max);
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ── Main ──────────────────────────────────────────────────────────────────────
async function start() {
  const username = $("username").value.trim().replace(/^@/, "");
  if (!username) { $("username").focus(); return; }

  const bestQuality   = $("opt-best").checked;
  const includeTitle  = $("opt-include-title").checked;

  reset();
  aborted = false;
  $("go-btn").disabled   = true;
  $("go-btn").innerHTML  = '<span class="spinner"></span>GRABBING';
  $("username").disabled = true;
  $("stop-btn").style.display = "inline-block";
  showStatus();

  try {
    // Phase 1: Fetch list
    setPhase("Fetching GIF list...");
    setProgress(5);
    log(`starting @${username}`, "log-info");

    const records = await fetchAllGifs(username);

    if (!records.length) {
      showError(`No GIFs found for @${username}. Check the username and try again.`);
      $("go-btn").disabled = false;
      $("go-btn").innerHTML = "GRAB";
      $("username").disabled = false;
      return;
    }

    const total = records.length;
    log(`total: ${total} GIFs found`, "log-info");

    // Phase 2: Download & ZIP
    setPhase("Downloading & zipping...");
    setCount(0, total);
    setProgress(10);

    const zip = new JSZip();
    const folder = zip.folder(username);
    let ok = 0, failed = 0;

    for (let i = 0; i < records.length; i++) {
      if (aborted) break;

      const rec   = records[i];
      const id    = rec.id || String(i);
      const title = (rec.h1_title || rec.title || "").trim();
      const namePart = includeTitle && title ? safeFilename(title) + "_" : "";
      const filename  = `${namePart}${id}.gif`;

      const url = getGifUrl(rec, bestQuality);
      if (!url) {
        log(`✗ no url — ${id}`, "log-err");
        failed++;
        continue;
      }

      try {
        const resp = await fetch(url);
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const blob = await resp.arrayBuffer();
        folder.file(filename, blob);
        ok++;
        log(`✓ ${filename}`, "log-ok");
      } catch (e) {
        log(`✗ ${filename} — ${e.message}`, "log-err");
        failed++;
      }

      const pct = 10 + Math.round((i + 1) / total * 85);
      setProgress(pct);
      setCount(i + 1, total);
      setMsg(filename);

      // small pause every 10 to avoid hammering
      if (i > 0 && i % 10 === 0) await sleep(300);
    }

    // Phase 3: Build ZIP
    setPhase("Building ZIP...");
    setProgress(97);
    setMsg("Compressing...");
    log("building zip...", "log-info");

    const zipBlob = await zip.generateAsync({ type: "blob", compression: "STORE" });
    setProgress(100);
    setMsg("Done!");
    log(`zip ready — ${(zipBlob.size/1024/1024).toFixed(1)} MB`, "log-info");

    showDone(username, ok, total, zipBlob);

  } catch (e) {
    showError(e.message || "Something went wrong.");
    log(`fatal: ${e.message}`, "log-err");
    $("go-btn").disabled   = false;
    $("go-btn").innerHTML  = "GRAB";
    $("username").disabled = false;
    $("stop-btn").style.display = "none";
  }
}

// Enter key support
document.getElementById("username").addEventListener("keydown", e => {
  if (e.key === "Enter") start();
});

// ── Theme toggle ─────────────────────────
const toggle = document.getElementById("theme-toggle");

function setTheme(theme){
  document.documentElement.setAttribute("data-theme", theme);
  localStorage.setItem("theme", theme);
  toggle.textContent = theme === "dark" ? "☀️" : "🌙";
}

function detectTheme(){
  const saved = localStorage.getItem("theme");

  if(saved){
    setTheme(saved);
  } else if(window.matchMedia("(prefers-color-scheme: dark)").matches){
    setTheme("dark");
  } else {
    setTheme("light");
  }
}

toggle.onclick = () => {
  const current = document.documentElement.getAttribute("data-theme");
  if(current === "dark"){
    setTheme("light");
  } else {
    setTheme("dark");
  }
};

detectTheme();

</script>
